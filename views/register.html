<div class="v-dark-background">
  <div class="bg-dark text-white py-4">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="row">
          <div class="col-sm-3">
            <a ui-sref="home" aria-label="Ir al inicio">
              <img class="logo" src="assets/logo.png" alt="voluntiex-logo">
            </a>
          </div>
          <div class="col-sm-9 d-flex flex-column align-items-start justify-content-center">
            <h2>Voluntiex</h2>
            <h3>Plataforma de Voluntariado</h3>
          </div>
        </div>
        <div class="nav-menu d-flex">
            <a ui-sref="home" class="text-white mr-4">Home</a>
            <a ui-sref="login" class="text-white mr-4">Login</a>
        </div>
    </div>
  </div>

  <div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center">Crear Cuenta</h2>
            <form ng-submit="registrarUsuario()" novalidate>
              <div>
                <span>Tipo de usuario:</span>
                <div class="form-check mts">
                  <input class="form-check-input" 
                    type="radio" 
                    name="tipoUsuario" 
                    id="tipoUsuario1" 
                    ng-model="nuevoUsuario.tipo" 
                    value="voluntario">
                  <label class="form-check-label" for="tipoUsuario1">
                      Voluntario
                  </label>
                </div>
              
                <div class="form-check">
                  <input class="form-check-input" 
                    type="radio" 
                    name="tipoUsuario" 
                    id="tipoUsuario2" 
                    ng-model="nuevoUsuario.tipo" 
                    value="beneficiario">
                  <label class="form-check-label" for="tipoUsuario2">
                      Beneficiario
                  </label>
                </div>
              
                <div class="form-check mbm">
                  <input class="form-check-input" 
                    type="radio" 
                    name="tipoUsuario" 
                    id="tipoUsuario3" 
                    ng-model="nuevoUsuario.tipo" 
                    value="organizacion">
                  <label class="form-check-label" for="tipoUsuario3">
                      Organización
                  </label>
                </div>
              </div>

              <div class="form-group">
                <label for="nombreUsuario">Nombre de Usuario</label>
                <input type="text" 
                  class="form-control" 
                  id="nombreUsuario" 
                  ng-model="nuevoUsuario.nombre" 
                  placeholder="Ingresa tu nombre" 
                  required>
              </div>

              <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" 
                  class="form-control" 
                  id="email" 
                  ng-model="nuevoUsuario.email" 
                  placeholder="Ingresa tu correo" 
                  required>
              </div>

              <div class="form-group">
                  <label for="password">Contraseña</label>
                  <input type="password" 
                    class="form-control" 
                    id="password" 
                    ng-model="nuevoUsuario.password" 
                    placeholder="Crea una contraseña" 
                    required>
              </div>

              <div class="form-group">
                  <label for="confirmPassword">Confirmar Contraseña</label>
                  <input type="password" 
                    class="form-control" 
                    id="confirmPassword" 
                    ng-model="nuevoUsuario.confirmPassword" 
                    placeholder="Confirma tu contraseña" 
                    required>
              </div>

              <button type="submit" 
                class="btn btn-success btn-block" 
                ng-disabled="isSubmitting">Registrar</button>
            </form>
  
            <p class="text-center mt-3">
                ¿Ya tienes cuenta? <a ui-sref="login" class="text-white">Inicia sesión aquí</a>
            </p>
        </div>
    </div>
  </div>

</div>
