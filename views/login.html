<div class="v-dark-background">
  <div class="bg-dark text-white py-4">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="row">
          <div class="col-sm-3">
            <a ui-sref="home" aria-label="Ir al inicio">
              <img class="logo" src="assets/logo.png" alt="voluntiex-logo">
            </a>
          </div>
          <div class="col-sm-9 d-flex flex-column align-items-start justify-content-center">
            <h2>Voluntiex</h2>
            <h3>Plataforma de Voluntariado</h3>
          </div>
        </div>
        <div class="d-flex flex-column align-items-end">
          <div class="nav-menu d-flex">
              <a ui-sref="home" class="text-white mr-4">Home</a>
              <a ui-sref="register" ng-if="!isValidSession()" class="text-white mr-4">Register</a>
              <a ui-sref="home" ng-if="isValidSession()" class="text-white" ng-click="logout()">Logout</a>
          </div>
          <div class="text-white mt-2" ng-if="isValidSession()">
            {{ getSessionUserName() }}<span ng-if="getSessionUserType()"> ({{ getSessionUserType() }})</span>
          </div>
        </div>
    </div>
  </div>

  <div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6" ng-if="!isValidSession()">
            <h2 class="text-center">Iniciar Sesión</h2>
            <form ng-submit="loginUsuario()" novalidate>
              <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" 
                  class="form-control" 
                  id="email" 
                  ng-model="usuario.email" 
                  placeholder="Ingresa tu correo" 
                  required>
              </div>
  
              <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" 
                  class="form-control" 
                  id="password" 
                  ng-model="usuario.password" 
                  placeholder="Ingresa tu contraseña" required>
              </div>
  
              <button type="submit" class="btn btn-primary btn-block">Iniciar sesión</button>
            </form>
  
            <p class="text-center mt-3">
                ¿No tienes cuenta? <a ui-sref="register" class="text-white">Regístrate aquí</a>
            </p>
        </div>
    </div>
  </div>

</div>
